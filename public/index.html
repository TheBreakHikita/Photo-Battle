<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото Батл</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23fbbf24'/></svg>">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --text-muted: #94a3b8; --winner: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Typography */
        /* Skeleton Loading */
        @keyframes shimmer {
            0% { background-position: -800px 0; }
            100% { background-position: 800px 0; }
        }
        .skeleton {
            background-color: #334155 !important;
            background-image: linear-gradient(90deg, #334155 0px, #475569 50%, #334155 100%) !important;
            background-size: 800px 100% !important;
            animation: shimmer 1.5s infinite linear !important;
            color: transparent !important;
            border: none !important;
        }
        h1, h2 { text-align: center; margin-bottom: 10px; }
        .status-badge { display: table; margin: 0 auto 40px; padding: 8px 16px; background: rgba(59, 130, 246, 0.2); color: var(--accent); border-radius: 20px; font-weight: bold; }
        
        /* Active Battle */
        .battle-section { position: relative; background: var(--surface); border-radius: 16px; padding: 40px 20px; text-align: center; margin-bottom: 60px; }
        .photos { display: flex; justify-content: center; align-items: center; gap: 30px; margin: 30px 0; flex-wrap: wrap; }
        .photo-wrapper { position: relative; width: 100%; max-width: 300px; }
        .photos img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .vs { font-size: 2rem; font-weight: 900; color: var(--accent); background: var(--bg); padding: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .btn { display: inline-block; background: var(--accent); color: white; padding: 16px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: 0.2s; text-align: center; box-sizing: border-box; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Battle Status Badges */
        .b-badge { display: inline-block; padding: 6px 12px; border-radius: 12px; font-size: 0.85em; font-weight: bold; margin-top: 10px; margin-bottom: 10px; letter-spacing: 0.5px; }
        .b-badge.active { background: rgba(34, 197, 94, 0.2); color: #4ade80; animation: pulse 2s infinite; }
        .b-badge.finished { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
        .btn.finished { background: #475569; }
        .btn.finished:hover { background: #334155; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Таймер боя */
        .battle-timer {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            display: inline-block; font-size: 1.1em; font-weight: bold; color: #f59e0b;
            padding: 8px 16px; background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 20px;
        }
        .battle-timer.expired {
            color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);
        }

        /* Подпись участника под фото */
        .participant-link {
            display: block; margin-top: 15px; font-size: 1.2em; font-weight: bold;
            color: var(--accent); text-decoration: none; padding: 10px;
            background: rgba(59, 130, 246, 0.1); border-radius: 12px; transition: 0.2s;
        }
        .participant-link:hover {
            background: rgba(59, 130, 246, 0.2); transform: scale(1.05);
        }
        
        /* Эффект победителя */
        .photo-wrapper.winner img {
            border: 4px solid var(--winner); 
            animation: photoPulse 2s infinite;
        }
        .winner-crown {
            position: absolute; top: -25px; right: -20px; font-size: 4rem; z-index: 10;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6));
        }

        /* Улучшенная двойная пульсация для фотографии победителя */
        @keyframes photoPulse {
            0% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6), 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.9), 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6), 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Organizers */
        .organizers { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .org-card { background: var(--surface); padding: 20px; border-radius: 12px; width: 250px; text-align: center; }
        .org-card h3 { margin: 10px 0 5px; }
        .org-card a { color: var(--accent); text-decoration: none; }
        /* Модальное окно почты */
        .mail-section { text-align: center; margin-bottom: 60px; padding: 30px; background: rgba(59, 130, 246, 0.05); border: 1px dashed var(--accent); border-radius: 16px; }
        .mail-section h2 { margin-bottom: 15px; color: var(--text); }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface); width: 90%; max-width: 500px; padding: 30px; border-radius: 16px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: fadeInScale 0.3s ease; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5em; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .close-modal:hover { color: var(--danger); }
        
        .modal-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .modal-form label { font-size: 0.9em; color: var(--text-muted); text-align: left; }
        .modal-form input, .modal-form textarea { width: 100%; padding: 12px; background: var(--bg); border: 1px solid #334155; border-radius: 8px; color: white; font-size: 1em; box-sizing: border-box; }
        .modal-form input:focus, .modal-form textarea:focus { border-color: var(--accent); outline: none; }
        .captcha-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .captcha-text { font-weight: bold; font-size: 1.2em; color: var(--winner); letter-spacing: 2px; }
        /* Реакции */
        .reactions-container {
            display: flex; justify-content: center; gap: 8px; margin-top: 15px; flex-wrap: wrap;
        }
        .reaction-btn {
            background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; border-radius: 20px;
            padding: 6px 12px; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: all 0.2s ease; color: var(--text); user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .reaction-btn:active { transform: scale(0.9); }
        .reaction-count { font-size: 0.9em; font-weight: bold; }
        
        .floating-emoji {
            position: fixed; pointer-events: none; font-size: 2.5rem; z-index: 9999;
            animation: floatUpEmoji 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes floatUpEmoji {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }
        
        /* Доминирующая реакция (бейджик) */
        .top-reaction-badge {
            position: absolute; top: -15px; left: -15px; font-size: 2rem;
            background: rgba(30, 41, 59, 0.9); border: 2px solid var(--accent);
            border-radius: 50%; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Падающие смайлы внутри рамки фото */
        .falling-container {
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 3/4;
            pointer-events: none; overflow: hidden; border-radius: 12px; z-index: 5;
        }
        .falling-emoji-item {
            position: absolute; opacity: 0.7; top: -15%;
            animation: fallDown linear infinite;
        }
        @keyframes fallDown {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(500px) rotate(360deg); opacity: 0; }
        }

        /* Empty State (Заглушка) */
        .empty-state h2 { font-size: 2.5em; line-height: 1.3; margin-bottom: 20px; color: var(--text); }
        .empty-state .btn-news { background: #f59e0b; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); padding: 18px 40px; font-size: 1.2em; display: inline-block; margin-top: 15px; }
        .empty-state .btn-news:hover { background: #d97706; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(245, 158, 11, 0.4); }
        /* Универсальная мобильная адаптация (обязательно в самом низу) */
        @media (max-width: 768px) { 
            .empty-state h2 { font-size: 1.8em; }
            .photos { flex-direction: column; gap: 15px; }
            .vs { padding: 10px; font-size: 1.5rem; }
            .btn { width: 100%; padding: 15px 20px; font-size: 1rem; }
            .status-badge { font-size: 0.9em; text-align: center; }
            h1 { font-size: 1.8em; }
            
            /* Исправленное положение бейджа и таймера */
            .battle-section { padding: 30px 15px; }
            
            .b-badge {
                display: table;
                margin: 0 auto 10px auto; /* Центрируем и делаем отступ */
            }
            
            .battle-timer {
                position: relative; /* Отменяет абсолютное позиционирование, чтобы не ломать текст */
                display: table; /* Блок красиво переносится на отдельную строку */
                top: auto; 
                right: auto;
                margin: 10px auto 25px auto; /* Аккуратные отступы сверху и снизу */
                font-size: 0.9em; /* Чуть уменьшаем шрифт */
                padding: 10px 15px;
                max-width: 90%; /* Защита от выхода за экран */
                text-align: center;
                line-height: 1.4;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Фото Батл</h1>
    <div id="statusBadge" class="status-badge skeleton" style="border-radius: 20px;">Загрузка...</div>

    <!-- Кнопки перехода -->
    <div style="text-align: center; margin-bottom: 50px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
        <a href="/bracket.html" class="btn" style="background: #8b5cf6; font-size: 1.2em; padding: 20px 40px; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);">
            🏆 Турнирная сетка
        </a>
        <a href="/info.html" class="btn" style="background: #3b82f6; font-size: 1.2em; padding: 20px 40px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);">
            ℹ️ Как участвовать
        </a>
    </div>

    <!-- Контейнер для всех боев -->
    <div id="battlesContainer">
        <!-- Скелетная загрузка -->
        <section class="battle-section" style="pointer-events: none;">
            <div class="skeleton" style="height: 35px; width: 50%; max-width: 300px; margin: 0 auto 15px; border-radius: 8px;"></div>
            <div class="skeleton" style="height: 28px; width: 180px; margin: 0 auto 30px; border-radius: 15px;"></div>
            <div class="photos">
                <div class="photo-wrapper"><div class="skeleton" style="width: 100%; aspect-ratio: 3/4; border-radius: 12px;"></div></div>
                <div class="skeleton" style="width: 70px; height: 70px; border-radius: 50%; flex-shrink: 0;"></div>
                <div class="photo-wrapper"><div class="skeleton" style="width: 100%; aspect-ratio: 3/4; border-radius: 12px;"></div></div>
            </div>
            <div class="skeleton" style="height: 55px; width: 280px; margin: 0 auto; border-radius: 30px;"></div>
        </section>
    </div>

    <!-- Анонимная почта -->
    <section class="mail-section" id="mailSectionBlock">
        <h2>✉️ Анонимная почта</h2>
        <div id="mailTimerContainer"></div>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Хочешь передать что-то организаторам или участникам?</p>
        <button class="btn" onclick="openMailModal()" style="background: #10b981;">Написать сообщение</button>
    </section>

    <!-- Модалка почты -->
    <div class="modal-overlay" id="mailModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeMailModal()">✖</span>
            <h2 style="color: var(--accent);">Отправить письмо</h2>
            <form class="modal-form" id="mailForm" onsubmit="submitMail(event)">
                <div>
                    <label>Ваше имя / Никнейм (необязательно)</label>
                    <input type="text" id="mailName" placeholder="Оставьте пустым для анонимности">
                </div>
                <div>
                    <label>Сообщение (до 1000 символов) *</label>
                    <textarea id="mailMessage" rows="5" maxlength="1000" placeholder="Напишите всё, что думаете..." required></textarea>
                </div>
                <div class="captcha-box">
                    <label style="margin: 0;">Решите пример:</label>
                    <span class="captcha-text" id="captchaTask">5 + 3 =</span>
                    <input type="number" id="captchaAnswer" required style="width: 80px; text-align: center;">
                </div>
                <button type="submit" class="btn" id="mailSubmitBtn" style="width: 100%; margin-top: 10px;">Отправить</button>
                <div id="mailStatus" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
            </form>
        </div>
    </div>
    
    <!-- Организаторы -->
    <section>
        <h2>Организаторы</h2>
        <div class="organizers" id="organizersContainer"></div>
    </section>
</div>

<script>
    let lastStateHash = "";
    let currentStateStrWithoutReactions = "";

    async function loadData() {
        try {
            const res = await fetch('/api/state');
            const state = await res.json();
            updateFromStream(state);
        } catch (e) { console.error("Ошибка обновления данных", e); }
    }

    function setupStream() {
        const evtSource = new EventSource('/api/stream');
        evtSource.onmessage = function(event) {
            try {
                const state = JSON.parse(event.data);
                updateFromStream(state);
            } catch(e) {}
        };
        evtSource.onerror = function() {
            evtSource.close();
            setTimeout(setupStream, 3000); // Переподключение при обрыве
        };
    }

    function updateFromStream(state) {
        const stateString = JSON.stringify(state);
        if (stateString === lastStateHash) return;
        
        // Проверяем, изменилось ли что-то кроме реакций (структура боев и т.д.)
        const coreState = { ...state };
        delete coreState.reactions;
        delete coreState.analytics;
        const coreStr = JSON.stringify(coreState);

        if (coreStr !== currentStateStrWithoutReactions) {
            // Если изменился турнир или настройки — полная перерисовка
            currentStateStrWithoutReactions = coreStr;
            render(state);
        } else {
            // Если только реакции — обновляем цифры без перезагрузки DOM (плавно)
            updateReactionsDOM(state.reactions);
        }

        lastStateHash = stateString;
        localStorage.setItem('battleCache', stateString);
    }

    function updateReactionsDOM(reactions) {
        // 1. Обновляем все кнопки реакций, даже если реакции обнулены админом
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            const bId = btn.getAttribute('data-b');
            const pId = btn.getAttribute('data-p');
            const r = btn.getAttribute('data-r');
            let count = 0;
            if (reactions && reactions[bId] && reactions[bId][pId] && reactions[bId][pId][r]) {
                count = reactions[bId][pId][r];
            }
            btn.querySelector('.reaction-count').innerText = count;
        });

        // 2. Обновляем бейджи главных реакций
        document.querySelectorAll('.photo-wrapper').forEach(wrapper => {
            const bId = wrapper.getAttribute('data-b');
            const pId = wrapper.getAttribute('data-p');
            
            let maxCount = 0;
            let topReact = null;
            
            if (reactions && reactions[bId] && reactions[bId][pId]) {
                const counts = reactions[bId][pId];
                for (const [r, c] of Object.entries(counts)) {
                    if (c > maxCount) { maxCount = c; topReact = r; }
                }
            }

            let badge = wrapper.querySelector('.top-reaction-badge');
            if (maxCount === 0) {
                if (badge) badge.remove();
            } else if (topReact) {
                if (!badge) {
                    badge = document.createElement('div');
                    badge.className = 'top-reaction-badge';
                    wrapper.insertBefore(badge, wrapper.querySelector('img') || wrapper.firstChild);
                }
                if (badge.innerText !== topReact) {
                    badge.innerText = topReact;
                    badge.style.animation = 'none';
                    badge.offsetHeight; // Перезапуск анимации
                    badge.style.animation = 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                }
            }
        });
    }

    // Мгновенная загрузка из кэша
    const cached = localStorage.getItem('battleCache');
    if (cached) {
        lastStateHash = cached;
        render(JSON.parse(cached));
    }

    function getPlayerContent(id, state) {
        if (!id) return "--- Ожидание ---";
        const p = state.participants.find(x => x.id === id);
        return p ? `${p.emoji} ${p.name}` : "Неизвестно";
    }

    function getPlayerProfileHtml(id, state) {
        if (!id) return '';
        const p = state.participants.find(x => x.id === id);
        if (!p) return '';
        // Если у участника есть ссылка, делаем кликабельным тегом <a>
        const tag = p.link ? 'a' : 'div';
        const href = p.link ? `href="${p.link}" target="_blank"` : '';
        return `<${tag} ${href} class="participant-link">${p.emoji} ${p.name}</${tag}>`;
    }

    function render(state) {
        // Убираем скелетную загрузку с бейджа
        const badge = document.getElementById('statusBadge');
        badge.classList.remove('skeleton');
        badge.style.color = '';
        
        // Установка бейджа
        setTimeout(updateTimers, 50); // Вызов таймера сразу после отрисовки
        // Логика отображения блока почты и таймера
        const mailBlock = document.getElementById('mailSectionBlock');
        const mailTimerContainer = document.getElementById('mailTimerContainer');
        
        if (mailBlock) {
            let showMail = state.mailEnabled !== false; // Главный переключатель
            let timerHtml = '';

            // Если почта включена, проверяем таймер
            if (showMail && state.mailTimerEnabled && state.mailEndTime) {
                const end = new Date(state.mailEndTime).getTime();
                const now = new Date().getTime();
                
                if (now >= end) {
                    showMail = false; // Время вышло - скрываем полностью
                } else {
                    // Рисуем таймер (стилизуем так, чтобы он красиво висел по центру)
                    timerHtml = `<div class="battle-timer" id="mailCountdown" data-mail-endtime="${state.mailEndTime}" style="position: relative; top: auto; right: auto; margin: 10px auto 20px auto; display: table;">⏳ Вычисляем время...</div>`;
                }
            }

            mailBlock.style.display = showMail ? 'block' : 'none';
            if (mailTimerContainer) mailTimerContainer.innerHTML = timerHtml;
        }
        document.getElementById('statusBadge').innerText = state.heroStatus;
        if (state.mode === 'presentation') {
            document.getElementById('statusBadge').style.background = 'rgba(255,255,255,0.1)';
            document.getElementById('statusBadge').style.color = 'white';
        }

        // Рендер боев (теперь их может быть несколько)
        const battlesContainer = document.getElementById('battlesContainer');
        battlesContainer.innerHTML = '';
        if (state.battles && state.battles.length > 0) {
            state.battles.forEach(battle => {
                const isWaiting = battle.status === 'waiting';
                const isFinished = battle.status === 'finished';
                const isActive = !battle.status || battle.status === 'active';
                
                let badgeHtml = '';
                if (isWaiting) {
                    badgeHtml = `<div class="b-badge" style="background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4);">🟡 ОЖИДАНИЕ НАЧАЛА</div>`;
                } else if (isActive) {
                    badgeHtml = `<div class="b-badge active">🔥 ИДЕТ ГОЛОСОВАНИЕ</div>`;
                } else {
                    badgeHtml = `<div class="b-badge finished">🏁 ПОБЕДИТЕЛЬ ВЫБРАН</div>`;
                }

                let btnText = 'Перейти к посту';
                if (isActive) btnText = 'Перейти к посту и проголосовать';
                else if (isWaiting) btnText = 'Перейти к посту (Скоро начало)';
                
                const btnClass = isFinished ? 'btn finished' : 'btn';

                const timerHtml = ((isActive || isWaiting) && battle.endTime) 
                    ? `<div class="battle-timer" data-endtime="${battle.endTime}" data-status="${battle.status || 'active'}">⏳ Вычисляем время...</div>` 
                    : '';

                // HTML профилей под фото
                const p1Html = getPlayerProfileHtml(battle.participant1, state);
                const p2Html = getPlayerProfileHtml(battle.participant2, state);

                // Логика подсветки победителя
                const isW1 = (!isActive && battle.winner === '1');
                const isW2 = (!isActive && battle.winner === '2');
                
                const w1Crown = isW1 ? '<div class="winner-crown">👑</div>' : '';
                const w2Crown = isW2 ? '<div class="winner-crown">👑</div>' : '';
                const w1Class = isW1 ? 'winner' : '';
                const w2Class = isW2 ? 'winner' : '';

                // Красивая SVG-заглушка с вопросительным знаком для пустых фото
                const defaultImg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='300' height='400' viewBox='0 0 300 400'%3E%3Crect width='300' height='400' fill='%23334155'/%3E%3Ctext x='50%25' y='50%25' font-family='sans-serif' font-size='100' font-weight='bold' fill='%2394a3b8' text-anchor='middle' dominant-baseline='middle'%3E?%3C/text%3E%3C/svg%3E";
                
                // Проверяем: если фото есть - используем его, если пусто - ставим заглушку
                const img1 = battle.photo1 && battle.photo1.trim() !== '' ? battle.photo1 : defaultImg;
                const img2 = battle.photo2 && battle.photo2.trim() !== '' ? battle.photo2 : defaultImg;

                const rState = state.reactions && state.reactions[battle.id] ? state.reactions[battle.id] : { '1': {}, '2': {} };
                
                // Функция поиска доминирующей реакции
                const getTopReaction = (part) => {
                    const counts = rState[part] || {};
                    let maxReact = null, maxCount = 0;
                    for (const [r, count] of Object.entries(counts)) {
                        if (count > maxCount) { maxCount = count; maxReact = r; }
                    }
                    return maxReact; // Возвращает эмодзи, если есть хотя бы 1 голос
                };

                const getReactHtml = (part) => {
                    if (isFinished) return ''; // Если бой завершен, скрываем кнопки (для ожидания и активного оставляем)
                    const counts = rState[part] || {};
                    const reacts = ['🔥', '😎', '💀'];
                    return `<div class="reactions-container">` + reacts.map(r => {
                        const count = counts[r] || 0;
                        return `<button class="reaction-btn" data-b="${battle.id}" data-p="${part}" data-r="${r}" onclick="sendReaction(event, '${battle.id}', '${part}', '${r}')">${r} <span class="reaction-count">${count}</span></button>`;
                    }).join('') + `</div>`;
                };

                // Генерация HTML для падающих смайлов (псевдорандомные позиции)
                const getFallingHtml = (emoji) => {
                    if (!emoji) return '';
                    let html = '<div class="falling-container">';
                    const poses = [10, 30, 50, 70, 85, 20];
                    const delays = [0, 1.5, 0.7, 2.2, 1.1, 2.8];
                    const durs = [4, 5, 3.5, 4.5, 3.8, 5.2];
                    const sizes = [1.2, 1.5, 1, 1.4, 1.3, 1.6];
                    for(let i=0; i<6; i++) {
                        html += `<div class="falling-emoji-item" style="left: ${poses[i]}%; animation-delay: ${delays[i]}s; animation-duration: ${durs[i]}s; font-size: ${sizes[i]}rem;">${emoji}</div>`;
                    }
                    return html + '</div>';
                };

                const topR1 = getTopReaction('1');
                const topR2 = getTopReaction('2');

                battlesContainer.innerHTML += `
                <section class="battle-section">
                    <h2>${battle.title}</h2>
                    ${badgeHtml}
                    ${timerHtml}
                    <div class="photos">
                        <div class="photo-wrapper ${w1Class}" data-b="${battle.id}" data-p="1">
                            ${w1Crown}
                            ${topR1 ? `<div class="top-reaction-badge">${topR1}</div>` : ''}
                            <img src="${img1}" alt="Участник 1">
                            ${getFallingHtml(topR1)}
                            ${p1Html}
                            ${getReactHtml('1')}
                        </div>
                        <div class="vs">VS</div>
                        <div class="photo-wrapper ${w2Class}" data-b="${battle.id}" data-p="2">
                            ${w2Crown}
                            ${topR2 ? `<div class="top-reaction-badge">${topR2}</div>` : ''}
                            <img src="${img2}" alt="Участник 2">
                            ${getFallingHtml(topR2)}
                            ${p2Html}
                            ${getReactHtml('2')}
                        </div>
                    </div>
                    <a href="${battle.link}" class="${btnClass}" target="_blank">${btnText}</a>
                </section>`;
            });
        } else {
            // Если боев нет, показываем заглушку
            let fallbackBtnHtml = '';
            const fallbackInfo = state.fallback || {};
            
            if (fallbackInfo.btnText && fallbackInfo.btnText.trim() !== '') {
                fallbackBtnHtml = `<a href="${fallbackInfo.btnLink || '#'}" target="_blank" class="btn btn-news">${fallbackInfo.btnText}</a>`;
            }

            battlesContainer.innerHTML = `
            <section class="battle-section empty-state" style="padding: 60px 20px;">
                <h2>Подождите...<br><span style="color: var(--accent);">Бой скоро появится!</span></h2>
                ${fallbackBtnHtml}
            </section>`;
        }

        // Рендер организаторов
        const orgContainer = document.getElementById('organizersContainer');
        orgContainer.innerHTML = '';
        if (state.organizers) {
            state.organizers.forEach(org => {
                orgContainer.innerHTML += `
                <div class="org-card">
                    <h2 style="margin:0">${org.emoji}</h2>
                    <h3>${org.role}</h3>
                    <a href="${org.link}" target="_blank">${org.name}</a>
                </div>`;
            });
        }
    }

// --- Логика Анонимной Почты ---
    let expectedCaptcha = 0;

    function openMailModal() {
        document.getElementById('mailModal').classList.add('active');
        document.getElementById('mailStatus').innerText = '';
        generateCaptcha();
    }

    function closeMailModal() {
        document.getElementById('mailModal').classList.remove('active');
        document.getElementById('mailForm').reset();
    }

    function generateCaptcha() {
        const num1 = Math.floor(Math.random() * 10) + 1;
        const num2 = Math.floor(Math.random() * 10) + 1;
        expectedCaptcha = num1 + num2;
        document.getElementById('captchaTask').innerText = `${num1} + ${num2} = `;
    }

    async function submitMail(e) {
        e.preventDefault();
        const btn = document.getElementById('mailSubmitBtn');
        const status = document.getElementById('mailStatus');
        
        const answer = parseInt(document.getElementById('captchaAnswer').value);
        if (answer !== expectedCaptcha) {
            status.style.color = '#ef4444';
            status.innerText = '❌ Неверный ответ в примере!';
            generateCaptcha();
            return;
        }

        const name = document.getElementById('mailName').value.trim();
        const message = document.getElementById('mailMessage').value.trim();

        btn.disabled = true;
        btn.innerText = 'Отправка...';

        try {
            const res = await fetch('/api/mail', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, message })
            });
            const data = await res.json();

            if (data.success) {
                status.style.color = '#10b981';
                status.innerText = '✅ Письмо успешно отправлено!';
                setTimeout(closeMailModal, 2000);
            } else {
                throw new Error(data.error || 'Ошибка сервера');
            }
        } catch (err) {
            status.style.color = '#ef4444';
            status.innerText = `❌ ${err.message}`;
            generateCaptcha();
        } finally {
            btn.disabled = false;
            btn.innerText = 'Отправить';
        }
    }

    let reactionQueue = {};
    let reactionTimer = null;

    function sendReaction(event, battleId, participant, reaction) {
        const btn = event.currentTarget;
        
        // Эффект вылетающего смайла
        const emoji = document.createElement('div');
        emoji.className = 'floating-emoji';
        emoji.innerText = reaction;
        
        let clientX = event.clientX, clientY = event.clientY;
        if (event.touches && event.touches.length > 0) { clientX = event.touches[0].clientX; clientY = event.touches[0].clientY; } 
        else if (clientX === undefined) { const rect = btn.getBoundingClientRect(); clientX = rect.left + rect.width / 2; clientY = rect.top + rect.height / 2; }

        emoji.style.left = clientX + 'px'; emoji.style.top = clientY + 'px';
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 800);

        btn.style.transform = 'scale(0.85)';
        setTimeout(() => btn.style.transform = '', 100);

        // 1. Мгновенно обновляем счетчик у себя
        const countSpan = btn.querySelector('.reaction-count');
        const newCount = parseInt(countSpan.innerText) + 1;
        countSpan.innerText = newCount;

        // 2. Мгновенно вычисляем и меняем главную реакцию визуально
        const wrapper = btn.closest('.photo-wrapper');
        let maxC = 0; let topReact = null;
        wrapper.querySelectorAll('.reaction-btn').forEach(b => {
            const r = b.getAttribute('data-r');
            const c = parseInt(b.querySelector('.reaction-count').innerText);
            if (c > maxC) { maxC = c; topReact = r; }
        });

        let badge = wrapper.querySelector('.top-reaction-badge');
        if (!badge && topReact) {
            badge = document.createElement('div');
            badge.className = 'top-reaction-badge';
            wrapper.insertBefore(badge, wrapper.querySelector('img') || wrapper.firstChild);
        }
        if (badge && badge.innerText !== topReact) {
            badge.innerText = topReact;
            badge.style.animation = 'none';
            badge.offsetHeight; // Перезапуск анимации
            badge.style.animation = 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        }

        // 3. Отправляем в очередь на сервер (Debounce)
        const key = `${battleId}|${participant}|${reaction}`;
        reactionQueue[key] = (reactionQueue[key] || 0) + 1;

        if (!reactionTimer) {
            reactionTimer = setTimeout(flushReactions, 2000); // Сливаем пачку раз в 2 секунды
        }
    }

    function flushReactions() {
        const items = { ...reactionQueue };
        reactionQueue = {};
        reactionTimer = null;

        if (Object.keys(items).length === 0) return;

        fetch('/api/react-bulk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reactions: items })
        }).catch(e => console.error(e));
    }
    
    // Функция обновления таймеров
    function updateTimers() {
        // 1. Таймеры для активных боев
        document.querySelectorAll('.battle-timer').forEach(el => {
            const endTimeStr = el.getAttribute('data-endtime');
            if (!endTimeStr) return;
            const status = el.getAttribute('data-status') || 'active';

            const end = new Date(endTimeStr).getTime();
            const now = new Date().getTime();
            const diff = end - now;

            if (diff <= 0) {
                el.innerHTML = '⏰ Время вышло!';
                el.classList.add('expired');
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            let timeStr = status === 'waiting' ? '⏳ До начала: ' : '⏳ До конца: ';
            if (d > 0) timeStr += `${d}д `;
            timeStr += `${h.toString().padStart(2, '0')}ч ${m.toString().padStart(2, '0')}м ${s.toString().padStart(2, '0')}с`;
            
            el.innerHTML = timeStr;
        });

        // 2. Живой таймер для анонимной почты (теперь внутри функции)
        const mailTimerEl = document.getElementById('mailCountdown');
        if (mailTimerEl) {
            const endTimeStr = mailTimerEl.getAttribute('data-mail-endtime');
            if (endTimeStr) {
                const end = new Date(endTimeStr).getTime();
                const now = new Date().getTime();
                const diff = end - now;

                if (diff <= 0) {
                    // Время вышло прямо сейчас! Полностью скрываем блок почты
                    const mailBlock = document.getElementById('mailSectionBlock');
                    if (mailBlock) mailBlock.style.display = 'none';
                } else {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);

                    let timeStr = '⏳ До закрытия почты: ';
                    if (d > 0) timeStr += `${d}д `;
                    timeStr += `${h.toString().padStart(2, '0')}ч ${m.toString().padStart(2, '0')}м ${s.toString().padStart(2, '0')}с`;
                    
                    mailTimerEl.innerHTML = timeStr;
                }
            }
        }
    } // Конец функции updateTimers

    // Запускаем обновление таймеров каждую секунду
    setInterval(updateTimers, 1000);

    loadData();
    setupStream(); // Запуск Realtime-стрима вместо setInterval
    // Учет просмотра страницы
    if (!sessionStorage.getItem('tracked_index')) {
        fetch('/api/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ page: 'index' }) })
            .then(() => sessionStorage.setItem('tracked_index', 'true'))
            .catch(e => console.error('Analytics error:', e));
    }
</script>
