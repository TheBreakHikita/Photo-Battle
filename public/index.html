<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото Батл</title>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --text-muted: #94a3b8; --winner: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Typography */
        h1, h2 { text-align: center; margin-bottom: 10px; }
        .status-badge { display: table; margin: 0 auto 40px; padding: 8px 16px; background: rgba(59, 130, 246, 0.2); color: var(--accent); border-radius: 20px; font-weight: bold; }

        /* Dynamic Tournament Bracket */
        .bracket-wrapper { display: flex; gap: 40px; margin-bottom: 60px; overflow-x: auto; padding-bottom: 20px; align-items: center; }
        .bracket-col { display: flex; flex-direction: column; justify-content: space-around; min-width: 220px; gap: 15px; }
        
        .match { background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .match.final { border: 2px solid var(--accent); transform: scale(1.05); }
        .player { padding: 8px; margin: 4px 0; border-radius: 4px; background: #0f172a; font-size: 0.9em; transition: 0.3s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player.winner { border-left: 4px solid var(--winner); font-weight: bold; background: rgba(34, 197, 94, 0.1); }
        
        /* Active Battle */
        .battle-section { background: var(--surface); border-radius: 16px; padding: 40px 20px; text-align: center; margin-bottom: 60px; }
        .photos { display: flex; justify-content: center; align-items: center; gap: 30px; margin: 30px 0; flex-wrap: wrap; }
        .photo-wrapper { position: relative; }
        .photos img { width: 300px; height: 400px; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .vs { font-size: 2rem; font-weight: 900; color: var(--accent); background: var(--bg); padding: 20px; border-radius: 50%; }
        
        .btn { display: inline-block; background: var(--accent); color: white; padding: 16px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }

        /* Organizers */
        .organizers { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .org-card { background: var(--surface); padding: 20px; border-radius: 12px; width: 250px; text-align: center; }
        .org-card h3 { margin: 10px 0 5px; }
        .org-card a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Фото Батл</h1>
    <div id="statusBadge" class="status-badge">Загрузка...</div>

    <!-- Динамическая турнирная сетка -->
    <div class="bracket-wrapper" id="dynamicBracket">
        <!-- Сюда алгоритм вставит любое количество колонок -->
    </div>

    <!-- Контейнер для всех боев -->
    <div id="battlesContainer"></div>

    <!-- Организаторы -->
    <section>
        <h2>Организаторы</h2>
        <div class="organizers" id="organizersContainer"></div>
    </section>
</div>

<script>
    async function loadData() {
        const res = await fetch('/api/state');
        const state = await res.json();
        render(state);
    }

    function getPlayerContent(id, state) {
        if (!id) return "--- Ожидание ---";
        const p = state.participants.find(x => x.id === id);
        return p ? `${p.emoji} ${p.name}` : "Неизвестно";
    }

    function render(state) {
        // Установка бейджа
        document.getElementById('statusBadge').innerText = state.heroStatus;
        if (state.mode === 'presentation') {
            document.getElementById('statusBadge').style.background = 'rgba(255,255,255,0.1)';
            document.getElementById('statusBadge').style.color = 'white';
        }

        // Алгоритмический рендер сетки
        const bracket = document.getElementById('dynamicBracket');
        bracket.innerHTML = '';
        
        if(state.bracketMeta && state.bracketMeta.rounds) {
            for(let r = 1; r <= state.bracketMeta.rounds; r++) {
                const col = document.createElement('div');
                col.className = 'bracket-col';
                // Заголовок колонки
                if (r === state.bracketMeta.rounds) col.innerHTML = '<h3 style="text-align:center; color: var(--accent);">ФИНАЛ</h3>';
                else col.innerHTML = `<h3 style="text-align:center; color: var(--text-muted);">Раунд ${r}</h3>`;

                const matchCount = state.bracketMeta.totalSlots / Math.pow(2, r);
                for(let m = 1; m <= matchCount; m++) {
                    const matchData = state.matches[`r${r}_m${m}`];
                    if(!matchData) continue;

                    const p1Content = getPlayerContent(matchData.p1, state);
                    const p2Content = getPlayerContent(matchData.p2, state);
                    
                    const mDiv = document.createElement('div');
                    mDiv.className = 'match';
                    if(r === state.bracketMeta.rounds) mDiv.classList.add('final');
                    
                    mDiv.innerHTML = `
                        <div class="player ${matchData.winner === matchData.p1 && matchData.p1 ? 'winner' : ''}">${p1Content}</div>
                        <div class="player ${matchData.winner === matchData.p2 && matchData.p2 ? 'winner' : ''}">${p2Content}</div>
                    `;
                    col.appendChild(mDiv);
                }
                bracket.appendChild(col);
            }
        } else {
            bracket.innerHTML = '<div style="width:100%; text-align:center; color: #666;">Сетка формируется...</div>';
        }

        // Рендер боев (теперь их может быть несколько)
        const battlesContainer = document.getElementById('battlesContainer');
        battlesContainer.innerHTML = '';
        if (state.battles && state.battles.length > 0) {
            state.battles.forEach(battle => {
                battlesContainer.innerHTML += `
                <section class="battle-section">
                    <h2>${battle.title}</h2>
                    <div class="photos">
                        <div class="photo-wrapper"><img src="${battle.photo1}" alt="1"></div>
                        <div class="vs">VS</div>
                        <div class="photo-wrapper"><img src="${battle.photo2}" alt="2"></div>
                    </div>
                    <a href="${battle.link}" class="btn" target="_blank">Перейти к посту и проголосовать</a>
                </section>`;
            });
        }

        // Рендер организаторов
        const orgContainer = document.getElementById('organizersContainer');
        orgContainer.innerHTML = '';
        if (state.organizers) {
            state.organizers.forEach(org => {
                orgContainer.innerHTML += `
                <div class="org-card">
                    <h2 style="margin:0">${org.emoji}</h2>
                    <h3>${org.role}</h3>
                    <a href="${org.link}" target="_blank">${org.name}</a>
                </div>`;
            });
        }
    }

    loadData();
    setInterval(loadData, 10000); // Автообновление каждые 10 сек (на случай долгого открытого окна)
</script>
</body>
</html>
