<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка</title>
    <!-- Подключаем библиотеку для Drag-and-Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-danger { background: #ef4444; }
        
        /* Участники D&D */
        #participantsList { list-style: none; padding: 0; }
        .participant-item { display: flex; align-items: center; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 5px; border-radius: 5px; cursor: grab; }
        .participant-item input { margin-left: 10px; width: auto; flex-grow: 1; }
        
        /* Сетка в админке */
        .admin-match { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fafafa; }
        .admin-match button { margin: 5px; padding: 5px 10px; cursor: pointer; }
        .winner-btn.active { background: #22c55e; color: white; border-color: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ Управление Турниром</h1>

    <h2>1. Режим сайта</h2>
    <select id="modeSelect">
        <option value="presentation">Режим Презентации (Ожидание турнира)</option>
        <option value="active">Активный Режим (Идет турнир)</option>
    </select>
    <div class="form-group" style="margin-top: 10px;">
        <label>Статус (под главным заголовком):</label>
        <input type="text" id="heroStatus">
    </div>

    <h2>2. Участники (Drag & Drop)</h2>
    <p style="font-size: 0.8em; color: #666;">Первые 8 участников попадают в сетку. Остальные — в резерве.</p>
    <button class="btn" onclick="addParticipant()" style="background: #10b981; width: auto; margin-bottom: 10px;">➕ Добавить участника</button>
    <ul id="participantsList"></ul>

    <h2>3. Управление боями (Выбор победителей)</h2>
    <div id="bracketControls"></div>

    <h2>4. Активные бои</h2>
    <div id="battlesAdminContainer"></div>
    <button class="btn" onclick="addBattle()" style="background: #10b981; margin-bottom: 20px;">➕ Добавить еще один бой</button>

    <h2>5. Организаторы</h2>
    <div id="organizersAdminContainer"></div>

    <hr style="margin: 30px 0;">
    <div class="form-group">
        <label style="color: #ef4444;">Пароль администратора:</label>
        <input type="password" id="adminPassword" placeholder="Введите пароль для сохранения">
    </div>
    
    <button class="btn" onclick="saveState()">💾 Сохранить и применить на сайте</button>
    <button class="btn btn-danger" onclick="resetTournament()" style="margin-top: 20px;">⚠️ Сбросить сетку (Начать заново)</button>
</div>

<script>
    let appState = null;

    const bracketLogic = {
        q1: { nextMatch: 's1', slot: 'p1' }, q2: { nextMatch: 's1', slot: 'p2' },
        q3: { nextMatch: 's2', slot: 'p1' }, q4: { nextMatch: 's2', slot: 'p2' },
        s1: { nextMatch: 'f1', slot: 'p1' }, s2: { nextMatch: 'f1', slot: 'p2' }
    };

    async function loadData() {
        const res = await fetch('/api/state');
        appState = await res.json();
        if(!appState.battles) appState.battles = []; // Защита от старых данных
        if(!appState.organizers) appState.organizers = [];
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('modeSelect').value = appState.mode;
        document.getElementById('heroStatus').value = appState.heroStatus;
        
        renderParticipants();
        renderBracketControls();
        renderBattles();
        renderOrganizers();
    }

    // --- УЧАСТНИКИ ---
    function renderParticipants() {
        const list = document.getElementById('participantsList');
        list.innerHTML = '';
        appState.participants.forEach((p, index) => {
            const li = document.createElement('li');
            li.className = 'participant-item';
            li.dataset.id = p.id;
            // Первые 8 подсвечиваем, остальные прозрачные
            if(index >= 8) li.style.opacity = '0.5'; 
            li.innerHTML = `
                <span style="cursor: grab; font-size: 1.2em; padding: 0 10px;">↕️</span>
                <input type="text" value="${p.emoji}" class="p-emoji" style="width: 50px;" placeholder="Смайл">
                <input type="text" value="${p.name}" class="p-name" placeholder="Никнейм">
                <button onclick="removeParticipant('${p.id}')" style="background: #ef4444; color: white; border: none; padding: 10px; margin-left: 10px; border-radius: 5px; cursor:pointer;">❌</button>
            `;
            list.appendChild(li);
        });

        new Sortable(list, { animation: 150, onEnd: updatePairsFromDrag });
    }

    function addParticipant() {
        const newId = 'p' + Date.now();
        appState.participants.push({ id: newId, emoji: '👤', name: 'Новый участник' });
        updatePairsFromDrag();
        renderAdmin();
    }

    function removeParticipant(id) {
        if(!confirm('Удалить участника?')) return;
        appState.participants = appState.participants.filter(p => p.id !== id);
        updatePairsFromDrag();
        renderAdmin();
    }

    function updatePairsFromDrag() {
        const items = document.querySelectorAll('.participant-item');
        appState.participants = Array.from(items).map(item => ({
            id: item.dataset.id,
            emoji: item.querySelector('.p-emoji').value,
            name: item.querySelector('.p-name').value
        }));

        // Безопасное обновление сетки (берем первых 8)
        const getP = (index) => appState.participants[index] ? appState.participants[index].id : null;
        
        appState.matches.q1.p1 = getP(0); appState.matches.q1.p2 = getP(1);
        appState.matches.q2.p1 = getP(2); appState.matches.q2.p2 = getP(3);
        appState.matches.q3.p1 = getP(4); appState.matches.q3.p2 = getP(5);
        appState.matches.q4.p1 = getP(6); appState.matches.q4.p2 = getP(7);

        renderParticipants(); // Обновляем прозрачность запасных
        renderBracketControls();
    }

    // --- БОИ ---
    function renderBattles() {
        const container = document.getElementById('battlesAdminContainer');
        container.innerHTML = '';
        appState.battles.forEach((b, index) => {
            container.innerHTML += `
            <div class="admin-match" style="border-left: 4px solid #3b82f6;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <strong style="font-size: 1.1em;">Бой #${index + 1}</strong>
                    <button onclick="removeBattle('${b.id}')" style="background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor:pointer;">Удалить бой</button>
                </div>
                <div class="form-group"><label>Заголовок:</label><input type="text" class="b-title" value="${b.title}"></div>
                <div class="form-group"><label>Фото 1:</label><input type="text" class="b-p1" value="${b.photo1}"></div>
                <div class="form-group"><label>Фото 2:</label><input type="text" class="b-p2" value="${b.photo2}"></div>
                <div class="form-group"><label>Ссылка на пост:</label><input type="text" class="b-link" value="${b.link}"></div>
            </div>`;
        });
    }

    function addBattle() {
        appState.battles.push({
            id: 'b' + Date.now(), title: "Новый бой", photo1: "", photo2: "", link: ""
        });
        renderBattles();
    }

    function removeBattle(id) {
        appState.battles = appState.battles.filter(b => b.id !== id);
        renderBattles();
    }

    function saveBattlesToState() {
        const battleBlocks = document.querySelectorAll('#battlesAdminContainer .admin-match');
        appState.battles = Array.from(battleBlocks).map((block, index) => ({
            id: appState.battles[index].id,
            title: block.querySelector('.b-title').value,
            photo1: block.querySelector('.b-p1').value,
            photo2: block.querySelector('.b-p2').value,
            link: block.querySelector('.b-link').value
        }));
    }

    // --- ОРГАНИЗАТОРЫ ---
    function renderOrganizers() {
        const container = document.getElementById('organizersAdminContainer');
        container.innerHTML = '';
        appState.organizers.forEach((org, index) => {
            container.innerHTML += `
            <div class="admin-match">
                <strong>Организатор ${index + 1}</strong>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <input type="text" class="o-emoji" value="${org.emoji}" style="width: 60px;" placeholder="Смайл">
                    <input type="text" class="o-role" value="${org.role}" placeholder="Роль (напр. Ведущий)">
                </div>
                <input type="text" class="o-name" value="${org.name}" placeholder="Ник (@name)" style="margin-top:5px;">
                <input type="text" class="o-link" value="${org.link}" placeholder="Ссылка на профиль (https://...)" style="margin-top:5px;">
            </div>`;
        });
    }

    function saveOrganizersToState() {
        const blocks = document.querySelectorAll('#organizersAdminContainer .admin-match');
        appState.organizers = Array.from(blocks).map((block) => ({
            emoji: block.querySelector('.o-emoji').value,
            role: block.querySelector('.o-role').value,
            name: block.querySelector('.o-name').value,
            link: block.querySelector('.o-link').value
        }));
    }

    // --- СЕТКА И СОХРАНЕНИЕ ---
    function getPlayerName(id) {
        if (!id) return "Нет участника";
        const p = appState.participants.find(x => x.id === id);
        return p ? `${p.emoji} ${p.name}` : "Неизвестно";
    }

    function renderBracketControls() {
        const container = document.getElementById('bracketControls');
        container.innerHTML = '';
        Object.keys(appState.matches).forEach(matchId => {
            const m = appState.matches[matchId];
            const div = document.createElement('div');
            div.className = 'admin-match';
            div.innerHTML = `
                <strong>Матч ${matchId.toUpperCase()}:</strong> 
                <button class="winner-btn ${m.winner === m.p1 && m.p1 ? 'active' : ''}" 
                        onclick="setWinner('${matchId}', '${m.p1}')" ${!m.p1 ? 'disabled' : ''}>Победа: ${getPlayerName(m.p1)}</button>
                <button class="winner-btn ${m.winner === m.p2 && m.p2 ? 'active' : ''}" 
                        onclick="setWinner('${matchId}', '${m.p2}')" ${!m.p2 ? 'disabled' : ''}>Победа: ${getPlayerName(m.p2)}</button>
            `;
            container.appendChild(div);
        });
    }

    function setWinner(matchId, playerId) {
        if (!playerId || playerId === 'null') return;
        appState.matches[matchId].winner = playerId;
        const logic = bracketLogic[matchId];
        if (logic) {
            appState.matches[logic.nextMatch][logic.slot] = playerId;
            appState.matches[logic.nextMatch].winner = null; 
        }
        renderBracketControls();
    }

    function resetTournament() {
        if(!confirm("Очистить сетку?")) return;
        Object.keys(appState.matches).forEach(key => appState.matches[key].winner = null);
        appState.matches.s1.p1 = appState.matches.s1.p2 = null;
        appState.matches.s2.p1 = appState.matches.s2.p2 = null;
        appState.matches.f1.p1 = appState.matches.f1.p2 = null;
        renderAdmin();
    }

    async function saveState() {
        updatePairsFromDrag(); 
        saveBattlesToState();
        saveOrganizersToState();

        appState.mode = document.getElementById('modeSelect').value;
        appState.heroStatus = document.getElementById('heroStatus').value;
        const password = document.getElementById('adminPassword').value;

        const res = await fetch('/api/state', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password, newState: appState })
        });

        const data = await res.json();
        if (data.success) alert("✅ Сохранено!");
        else alert("❌ Ошибка: " + data.error);
    }

    loadData();
</script>
</body>
</html>
