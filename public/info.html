<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация об ивенте</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23fbbf24'/></svg>">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --text-muted: #94a3b8; --winner: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: var(--surface); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .back-btn { display: inline-block; color: white; text-decoration: none; background: #334155; padding: 10px 20px; border-radius: 20px; margin-bottom: 30px; transition: 0.2s; }
        .back-btn:hover { background: #475569; }

        h1 { text-align: center; margin-bottom: 30px; font-size: 2.2em; color: var(--accent); }
        
        /* Стили для сворачивающихся блоков */
        .info-block { background: #0f172a; border: 1px solid #334155; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .info-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; font-size: 1.2em; color: var(--text); transition: background 0.2s; user-select: none; }
        .info-header:hover { background: #1e293b; }
        .info-header .arrow { transition: transform 0.3s ease; font-size: 0.9em; color: var(--accent); }
        .info-block.expanded .info-header .arrow { transform: rotate(180deg); }
        
        /* Умное снятие ограничения высоты через CSS Grid */
        .info-content-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s ease; background: var(--surface); }
        .info-block.expanded .info-content-wrapper { grid-template-rows: 1fr; }
        .info-content { min-height: 0; overflow: hidden; padding: 0 20px; transition: padding 0.4s ease; cursor: pointer; }
        .info-block.expanded .info-content { padding: 20px; }
        
        .description-text { font-size: 1.1em; color: var(--text); white-space: pre-wrap; line-height: 1.6; }

        .cta-container { text-align: center; margin-top: 40px; border-top: 1px solid #334155; padding-top: 40px; }
        .btn { display: inline-block; background: var(--winner); color: white; padding: 18px 50px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.3em; transition: 0.2s; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3); box-sizing: border-box; text-align: center; }
        .btn:hover { background: #16a34a; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(34, 197, 94, 0.4); }
        
        #loading { text-align: center; color: var(--text-muted); }
        #content { display: none; }

        /* Mobile Adaptation */
        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .container { padding: 25px 20px; }
            h1 { font-size: 1.6em; }
            .description { font-size: 1em; }
            .btn { width: 100%; font-size: 1.1em; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-btn">⬅ Назад на главную</a>
    
    <div id="loading">Загрузка информации...</div>
    
    <div id="content">
        <h1>Информация об ивенте</h1>
        
        <!-- Контейнер для блоков -->
        <div id="blocksContainer"></div>
        
        <div class="cta-container" id="ctaContainer">
            <a href="#" class="btn" id="infoBtn" target="_blank">Участвовать</a>
        </div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch('/api/state');
            const state = await res.json();
            render(state);
        } catch (e) {
            document.getElementById('loading').innerText = "Ошибка загрузки данных.";
            console.error(e);
        }
    }

    function toggleBlock(element) {
        const block = element.closest('.info-block');
        block.classList.toggle('expanded');
    }

    function render(state) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        const info = state.eventInfo || {};
        
        // Миграция старых данных или использование новых блоков
        let blocks = info.blocks;
        if (!blocks || blocks.length === 0) {
            blocks = [{
                title: info.title || 'Главная информация',
                description: info.description || 'Тут пока ничего нет.',
                expanded: true
            }];
        }

        const container = document.getElementById('blocksContainer');
        container.innerHTML = '';

        blocks.forEach((block, index) => {
            const isExpanded = block.expanded ? 'expanded' : '';
            container.innerHTML += `
                <div class="info-block ${isExpanded}">
                    <div class="info-header" onclick="toggleBlock(this)">
                        <span>${block.title}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="info-content-wrapper">
                        <div class="info-content" onclick="toggleBlock(this)" title="Нажмите, чтобы свернуть">
                            <div class="description-text">${block.description}</div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        const btn = document.getElementById('infoBtn');
        const ctaContainer = document.getElementById('ctaContainer');

        if (info.buttonLink) {
            btn.innerText = info.buttonText || 'Участвовать';
            btn.href = info.buttonLink;
            ctaContainer.style.display = 'block';
        } else {
            // Скрываем кнопку, если ссылка не указана
            ctaContainer.style.display = 'none';
        }
    }

    loadData();

    // Учет просмотра страницы
    if (!sessionStorage.getItem('tracked_info')) {
        fetch('/api/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ page: 'info' }) })
            .then(() => sessionStorage.setItem('tracked_info', 'true'))
            .catch(e => console.error('Analytics error:', e));
    }
</script>
</body>
</html>
